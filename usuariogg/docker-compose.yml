version: '3.8'

services:
  
  db-usuario:
    image: mysql:8.0
    container_name: mysql-usuario-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuariogg_db
    ports:
      - "3307:3306" 
    volumes:
      - mysql_data:/var/lib/mysql

  
  app-usuario:
    build: .
    container_name: spring-usuario-app
    ports:
      - "8082:8084"
    depends_on:
      - db-usuario
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-usuario:3306/usuariogg_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  mysql_data: